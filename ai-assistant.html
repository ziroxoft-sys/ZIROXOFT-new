<body>
  
  
  
  <script src="https://pl27679956.effectivecpmnetwork.com/e2/96/92/e2969277e330fe8328e30a8bcbb86e20.js"></script>
  
  
  
  
  
  
  <div class="container">
    <h1>مولد رمز QR للرابط</h1>
    <input type="text" id="url-input" placeholder="أدخل الرابط هنا">
    <div class="buttons">
      <button onclick="generateQR()">تحويل إلى QR</button>
      <button onclick="downloadPDF()">تحميل كـ PDF</button>
     <button onclick="copyQR()">نسخ QR</button>
    </div>
    <div id="qr-container">
      <canvas id="qr-code"></canvas>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="ai-assistant.js"></script>





   
<script>
// ⚡️ كود تسريع الصفحة
document.addEventListener("DOMContentLoaded", () => {
  // تأجيل تحميل الصور غير المرئية
  const imgs = document.querySelectorAll("img");
  imgs.forEach(img => {
    if ("loading" in HTMLImageElement.prototype) {
      img.loading = "lazy";
    }
  });

  // تنظيف الكاش كل فترة لتسريع التحديثات
  if ('caches' in window) {
    caches.keys().then(keys => {
      for (let key of keys) {
        if (key.includes("temp")) caches.delete(key);
      }
    });
  }

  // تحسين الأداء بإلغاء أي مؤقتات بطيئة بعد التحميل
  setTimeout(() => {
    performance.clearMarks?.();
    performance.clearMeasures?.();
  }, 5000);
});
</script>
 
  
 

 
<script type="module" src="tracker.js"></script>
