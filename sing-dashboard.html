<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ziroxoft Dashboard</title>

<link rel="stylesheet" href="sing-dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">



<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1621396288409139"
     crossorigin="anonymous"></script>









</head>
<body>

<div class="dashboard">

<div class="top-bar">

<h1>Ziroxoft Control Panel</h1>

<button id="logoutBtn">

<i class="fas fa-right-from-bracket"></i>

Logout

</button>

</div>

<div class="profile-card">

<img
id="userPhoto"
src="user.png"
alt="User">

<div>

<h2 id="userName">

Ziroxoft User

</h2>

<p id="userEmail">

Loading...

</p>

</div>

</div>

<div class="stats-grid">

<div class="stat-box">

<i class="fas fa-coins"></i>

<h2 id="coins">

100

</h2>

<p>Z Coins</p>

</div>

<div class="stat-box">

<i class="fas fa-star"></i>

<h2 id="level">

1

</h2>

<p>Level</p>

</div>

<div class="stat-box">

<i class="fas fa-screwdriver-wrench"></i>

<h2 id="toolsUsed">

0

</h2>

<p>Tools Used</p>

</div>

<div class="stat-box">

<i class="fas fa-clock"></i>

<h2 id="minutesUsed">

0

</h2>

<p>Minutes Used</p>

</div>

</div>

<div class="progress-card">

<h2>Your Progress</h2>

<div class="progress-bar">

<div
id="progressFill"
class="progress-fill">

</div>

</div>

<p id="progressText">

Welcome To Ziroxoft 🚀

</p>

</div>

<div class="achievement-card">

<h2>

Achievements

</h2>

<div class="badges">

<div class="badge">

🏆 First Login

</div>

<div class="badge">

🚀 Explorer

</div>

<div class="badge">

⭐ Future Pro

</div>

</div>

</div>

</div>

<script
type="module"
src="sing-dashboard.js">

</script>

</body>
</html>
