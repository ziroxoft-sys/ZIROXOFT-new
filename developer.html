<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عارض التحديث الجديد | Ziroxoft</title>
    <link rel="stylesheet" href="developer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1621396288409139"
     crossorigin="anonymous"></script>





</head>
<body>

    <div class="video-container">
        <video id="custom-video" src="update-video.mp4" poster="poster.jpg"></video>
        
        <div class="video-controls">
            <div class="progress-area">
                <div class="progress-bar"><span></span></div>
            </div>
            
            <div class="controls-wrapper">
                <div class="right-controls">
                    <button id="play-pause" class="control-btn"><i class="fas fa-play"></i></button>
                    <button id="mute-unmute" class="control-btn"><i class="fas fa-volume-up"></i></button>
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>
                
                <div class="left-controls">
                    <span class="badge">التحديث الجديد v2.0</span>
                    <button id="fullscreen" class="control-btn"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="developer.js"></script>
</body>
</html>
